app = "validador-oc"
primary_region = "gru"

[build]

[env]
  APP_ENV = "production"
  MODO_OPERACAO = "consulta"
  CILIA_MODE = "deeplink"
  CILIA_BASE_URL = "https://sistema.cilia.com.br"
  EMAIL_ENABLED = "false"
  LOG_LEVEL = "INFO"
  R2_JANELA_DIAS = "210"
  R2_MODO = "alerta"
  DB_PATH = "/data/validador.db"
  RELATORIOS_DIR = "/data/relatorios"
  PORT = "8080"
  CLUB_API_BASE_V1 = "https://api.clubdacotacao.com.br/api"
  CLUB_API_BASE_V3 = "https://api.clubdacotacao.com.br/v3/api"
  CLUB_REQUEST_DELAY_MS = "100"
  CLUB_MAX_RETRIES = "3"
  PIPEFY_API_URL = "https://api.pipefy.com/graphql"
  PIPEFY_IDS_FILE = "config/pipefy_ids.json"
  # CORS: ajustar apos primeiro deploy do Vercel com o dominio real
  CORS_ORIGINS = "https://validador-oc.vercel.app"

# Secrets (definir via `fly secrets set`):
#   CLUB_LOGIN
#   CLUB_SENHA
#   PIPEFY_TOKEN
#   PIPE_ID
#   PIPEFY_PIPE_DEVOLUCAO_ID

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/health"

[[mounts]]
  source = "validador_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
